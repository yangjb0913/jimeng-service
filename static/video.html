<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生视频 - 即梦AI服务</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 生视频</h1>
            <nav>
                <a href="/" class="nav-link">🏠 返回首页</a>
                <a href="/keys.html" class="nav-link">🔐 密钥管理</a>
            </nav>
        </header>

        <main>
            <section class="generator-form">
                <div class="form-group">
                    <label for="function-select">功能选择</label>
                    <select id="function-select" class="form-control">
                        <option value="t2v_720">文生视频720p</option>
                        <option value="t2v_1080">文生视频1080p</option>
                        <option value="i2v_first_720">首帧视频720p</option>
                        <option value="i2v_first_1080">首帧视频1080p</option>
                        <option value="i2v_first_tail_720">首尾帧视频720p</option>
                        <option value="i2v_first_tail_1080">首尾帧视频1080p</option>
                        <option value="i2v_recamera_720">运镜视频720p</option>
                        <option value="ti2v_pro">3.0Pro视频</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="prompt">Prompt (描述)</label>
                    <textarea id="prompt" class="form-control" rows="4" placeholder="请输入视频描述"></textarea>
                </div>

                <div id="image-section" class="form-group" style="display:none;">
                    <label>参考图</label>
                    <div class="upload-area" id="upload-area">
                        <p>拖拽图片到此处或点击上传</p>
                        <input type="file" id="image-input" accept="image/*" hidden>
                    </div>
                    <div id="uploaded-images" class="uploaded-images"></div>
                </div>

                <div id="tail-image-section" class="form-group" style="display:none;">
                    <label>尾帧参考图</label>
                    <div class="upload-area" id="tail-upload-area">
                        <p>拖拽尾帧图片到此处或点击上传</p>
                        <input type="file" id="tail-image-input" accept="image/*" hidden>
                    </div>
                    <div id="tail-uploaded-images" class="uploaded-images"></div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="duration-select">视频时长</label>
                        <select id="duration-select" class="form-control">
                            <option value="121">5秒</option>
                            <option value="241">10秒</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="aspect-ratio">宽高比</label>
                        <select id="aspect-ratio" class="form-control">
                            <option value="16:9">16:9 (横屏)</option>
                            <option value="4:3">4:3</option>
                            <option value="1:1">1:1 (方形)</option>
                            <option value="3:4">3:4 (竖屏)</option>
                            <option value="9:16">9:16 (竖屏)</option>
                            <option value="21:9">21:9 (宽屏)</option>
                        </select>
                    </div>
                </div>

                <div id="camera-section" class="form-group" style="display:none;">
                    <label for="camera-template">运镜模板</label>
                    <select id="camera-template" class="form-control">
                        <option value="">选择运镜方式...</option>
                        <option value="hitchcock_dolly_in">希区柯克推进</option>
                        <option value="hitchcock_dolly_out">希区柯克拉远</option>
                        <option value="robo_arm">机械臂</option>
                        <option value="dynamic_orbit">动感环绕</option>
                        <option value="central_orbit">中心环绕</option>
                        <option value="crane_push">起重机</option>
                        <option value="quick_pull_back">超级拉远</option>
                        <option value="counterclockwise_swivel">逆时针回旋</option>
                        <option value="clockwise_swivel">顺时针回旋</option>
                        <option value="handheld">手持运镜</option>
                        <option value="rapid_push_pull">快速推拉</option>
                    </select>
                </div>

                <button id="generate-btn" class="btn btn-primary btn-large">🎬 开始生成</button>
            </section>

            <section id="result-section" class="result-section" style="display:none;">
                <h3>生成结果</h3>
                <div id="task-status" class="task-status">
                    <div class="loading-spinner">
                        <div class="spinner"></div>
                        <span id="status-text">等待中...</span>
                    </div>
                    <p>时长: <span id="duration-text">-</span></p>
                </div>
                <div id="video-result" class="video-result"></div>
            </section>
        </main>
    </div>

    <script src="/static/js/utils.js"></script>
    <script src="/static/js/video.js"></script>
</body>
</html>
